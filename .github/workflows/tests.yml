name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest -v --ignore=tests/test_integration_pipeline.py

      - name: Run integration tests
        run: uv run pytest tests/test_integration_pipeline.py -v
