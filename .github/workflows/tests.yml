name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/web/package-lock.json

      - name: Build frontend
        working-directory: app/web
        run: |
          npm ci
          npm run build

      - name: Run unit tests
        run: uv run pytest -v --ignore=tests/test_integration_pipeline.py

      - name: Run integration tests
        run: uv run pytest tests/test_integration_pipeline.py -v
